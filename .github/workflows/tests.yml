name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
        # LFS objects (model weights) are not needed for the tests, so they are
        # not fetched here, keeping CI fast and within LFS bandwidth limits.

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # The unit tests cover the pure-NumPy logic (preprocessing, metrics,
        # data loading). TensorFlow/SimpleITK are not installed; the
        # TensorFlow-dependent model tests skip automatically.
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<2.0" pytest

      - name: Run tests
        run: pytest -q
